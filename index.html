<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YoranSoft</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f9fc;
      --text: #1f2d3d;
      --card: #ffffff;
      --accent: #0d6efd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top, #ffffff, var(--bg));
      color: var(--text);
    }
    main {
      width: min(92vw, 640px);
      background: var(--card);
      padding: 2rem;
      border-radius: 14px;
      box-shadow: 0 12px 36px rgba(16, 24, 40, 0.08);
      text-align: center;
    }
    h1 { margin: 0 0 .75rem; }
    p { margin: 0; line-height: 1.6; }
    .accent { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <main>
    <h1>Welcome to YoranSoft</h1>
    <p>This is the official homepage for <span class="accent">yoransoft.com</span>.</p>
  </main>
</body>
</html>
